<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>逆轉裁判 御劍怜侍</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#fff;font-family:Microsoft JhengHei,sans-serif;font-size:24px}
    
    video.bg {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-1;
    }

    .dialog{position:fixed;bottom:0;left:0;width:100%;height:27%;background:#1a202c;padding:20px;border-top:3px solid #000}
    .name {
      position: absolute;
      top: -30px;
      left: 20px;
      background: #4a8fb8;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      padding: 6px 35px;
      clip-path: polygon(0% 50%, 20px 0%, calc(100% - 20px) 0%, 100% 50%, calc(100% - 20px) 100%, 20px 100%);
    }
    textarea{width:100%;height:80%;background:transparent;color:#fff;font-size:22px;border:none;outline:none;padding:10px}
    .objection{position:fixed;right:20px;bottom:30%;background:red;color:#fff;font-weight:bold;padding:12px 24px;font-size:18px;border:none;border-radius:6px}
    .control{position:fixed;top:10px;left:10px;display:flex;gap:8px;flex-wrap:wrap}
    button{padding:8px 12px;background:#3182ce;color:#fff;border:none;border-radius:4px}
  </style>
</head>
<body>

<video class="bg" autoplay loop muted playsinline preload="none">
  <source src="background.mp4.MOV" type="video/quicktime">
</video>

<div class="control">
  <button onclick="clearText()">清除</button>
  <button onclick="playBGM(1)">BGM1</button>
  <button onclick="playBGM(2)">BGM2</button>
  <button onclick="playBGM(3)">BGM3</button>
  <button onclick="playBGM(4)">BGM4</button>
  <button onclick="playBGM(5)">BGM5</button>
  <button onclick="vol(-0.1)">-音量</button>
  <button onclick="vol(+0.1)">+音量</button>
</div>

<button class="objection" onclick="objection()">異議あり！</button>

<div class="dialog">
  <div class="name">御劍怜侍</div>
  <textarea id="out" placeholder="輸入證詞..."></textarea>
</div>

<audio id="t" src="type-sound.wav">
<audio id="obj" src="Objection.mp3.wav">
<audio id="bgm1" loop src="bgm1.mp3">
<audio id="bgm2" loop src="bgm2.mp3">
<audio id="bgm3" loop src="bgm3.mp3">
<audio id="bgm4" loop src="bgm4.mp3">
<audio id="bgm5" loop src="bgm5.mp3.mp3">

<script>
const t = document.getElementById("t");
const obj = document.getElementById("obj");
const bgms = [
  document.getElementById("bgm1"),
  document.getElementById("bgm2"),
  document.getElementById("bgm3"),
  document.getElementById("bgm4"),
  document.getElementById("bgm5")
];
let now = null;
bgms.forEach(b => b.volume = 0.3);

let allowed = false;
document.addEventListener('click', () => {
  allowed = true;
}, { once: true });

document.getElementById('out').addEventListener('input', () => {
  if (!allowed) return;
  t.currentTime = 0;
  t.play().catch(()=>{});
});

function objection() {
  obj.currentTime = 0;
  obj.play().catch(()=>{});
}

function clearText() {
  document.getElementById("out").value = "";
}

function playBGM(n) {
  if(now) now.pause();
  now = bgms[n-1];
  now.currentTime = 0;
  now.play().catch(()=>{});
}

function vol(d) {
  if (now) now.volume = Math.max(0, Math.min(1, now.volume + d));
}
</script>
</body>
</html>
